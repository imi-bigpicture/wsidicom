[pytest]
testpaths = tests
markers =
    unittest: add a test as a unittest
    integration: add a test as an integration test
filterwarnings =
    error
    # Third-party deprecations we can't fix here (upstream debt):
    ignore:get_frame_offsets is deprecated:DeprecationWarning:pydicom.encaps
    ignore:PyImport_ImportModuleNoBlock:DeprecationWarning:openjpeg.utils
    # Benign warnings about quirks in the DICOM test slides:
    ignore:Invalid value for VR DT:UserWarning:pydicom.valuerep
    ignore:The length of the pixel data:UserWarning:pydicom.pixel_data_handlers.numpy_handler
    ignore:The odd length pixel data:UserWarning:pydicom.pixel_data_handlers.numpy_handler
    # GC/OS-timing dependent (e.g. Windows temp-file handles) — keep visible but
    # non-fatal so flaky cleanup timing can't fail an otherwise-green run:
