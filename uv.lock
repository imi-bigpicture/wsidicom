    { name = "cachetools" },
    { name = "dicomweb-client" },
    { name = "fsspec" },
    { name = "marshmallow" },
    { name = "numpy" },
    { name = "pillow" },
    { name = "pydicom" },
    { name = "universal-pathlib" },
]

[package.optional-dependencies]
imagecodecs = [
    { name = "imagecodecs", version = "2025.3.30", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version < '3.11'" },
    { name = "imagecodecs", version = "2026.3.6", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version == '3.11.*'" },
    { name = "imagecodecs", version = "2026.5.10", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version >= '3.12'" },
]
pyjpegls = [
    { name = "pyjpegls" },
]
pylibjpeg-openjpeg = [
    { name = "pylibjpeg-openjpeg" },
]
pylibjpeg-rle = [
    { name = "pylibjpeg-rle" },
]

[package.dev-dependencies]
dev = [
    { name = "codespell" },
    { name = "decoy" },
    { name = "pyright" },
    { name = "pytest" },
    { name = "pytest-watch" },
    { name = "ruff" },
    { name = "shapely" },
    { name = "wsidicom-data" },
    { name = "xmltodict" },
]

[package.metadata]
requires-dist = [
    { name = "cachetools", specifier = ">=7.1.3" },
    { name = "dicomweb-client", specifier = ">=0.59.2,<0.60.0" },
    { name = "fsspec", specifier = ">=2024.2.0" },
    { name = "imagecodecs", marker = "extra == 'imagecodecs'", specifier = ">=2024.1.1,!=2024.9.22" },
    { name = "marshmallow", specifier = ">=3.20.1,<4.0.0" },
    { name = "numpy", specifier = ">=1.22.0" },
    { name = "pillow", specifier = ">=9.1.1" },
    { name = "pydicom", specifier = ">=3.0.0" },
    { name = "pyjpegls", marker = "extra == 'pyjpegls'", specifier = ">=1.2.0,<2.0.0" },
    { name = "pylibjpeg-openjpeg", marker = "extra == 'pylibjpeg-openjpeg'", specifier = ">=2.1.1,<3.0.0" },
    { name = "pylibjpeg-rle", marker = "extra == 'pylibjpeg-rle'", specifier = ">=2.0.0,<3.0.0" },
    { name = "universal-pathlib", specifier = ">=0.2.1,<0.3.0" },
]
provides-extras = ["imagecodecs", "pylibjpeg-rle", "pyjpegls", "pylibjpeg-openjpeg"]

[package.metadata.requires-dev]
dev = [
    { name = "codespell", specifier = ">=2.2.5,<3.0.0" },
    { name = "decoy", specifier = ">=2.2.0,<3.0.0" },
    { name = "pyright", specifier = ">=1.1.409" },
    { name = "pytest", specifier = ">=7.2.0,<10.0.0" },
    { name = "pytest-watch", specifier = ">=4.2.0,<5.0.0" },
    { name = "ruff", specifier = ">=0.15.14" },
    { name = "shapely", specifier = ">=2.0.2,<3.0.0" },
    { name = "wsidicom-data", specifier = ">=0.3.0,<0.4.0" },
    { name = "xmltodict", specifier = ">=0.12.0,<0.13.0" },
]

